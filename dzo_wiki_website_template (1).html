<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DZO Wiki</title>

  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #0b0f1a;
      color: #e5e7eb;
    }

    header {
      background: #020617;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1f2937;
    }

    header h1 {
      font-size: 20px;
      margin: 0;
      color: #38bdf8;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .search {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
      background: #020617;
      color: white;
      font-size: 16px;
    }

    .filters {
      margin-bottom: 20px;
    }

    .filters button {
      margin-right: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .filters button:hover {
      background: #38bdf8;
      color: black;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #020617;
      border-radius: 14px;
      overflow: hidden;
      transition: 0.2s;
      border: 1px solid #1f2937;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #38bdf8;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card-content {
      padding: 12px;
    }

    .card h2 {
      margin: 0;
      font-size: 18px;
    }

    .tag {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 8px;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      font-size: 12px;
      font-weight: bold;
    }

    .form {
      margin-top: 40px;
      padding: 20px;
      background: #020617;
      border-radius: 12px;
      border: 1px solid #1f2937;
    }

    .form input {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #0f172a;
      color: white;
    }

    .form button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>DZO Wiki</h1>
</header>

<div class="container">

  <input type="text" id="search" class="search" placeholder="Search cars...">

  <div class="filters">
    <button onclick="filterClass('ALL')">All</button>
    <button onclick="filterClass('D')">D</button>
    <button onclick="filterClass('C')">C</button>
    <button onclick="filterClass('B')">B</button>
    <button onclick="filterClass('A')">A</button>
    <button onclick="filterClass('S')">S</button>
  </div>

  <div class="grid" id="carGrid"></div>

  <div class="form">
    <h3>Add New Car</h3>
    <input id="name" placeholder="Car Name">
    <input id="brand" placeholder="Brand">
    <input id="class" placeholder="Class (D, C, B, A, S)">
    <input id="speed" placeholder="Top Speed">
    <input id="image" placeholder="Image URL">
    <button onclick="addCar()">Add Car</button>
  </div>

</div>

<script>
let cars = JSON.parse(localStorage.getItem("cars")) || [];
let currentFilter = "ALL";

function displayCars() {
  const grid = document.getElementById("carGrid");
  const search = document.getElementById("search").value.toLowerCase();

  grid.innerHTML = "";

  cars
    .filter(car => (currentFilter === "ALL" || car.class === currentFilter))
    .filter(car => car.name.toLowerCase().includes(search))
    .forEach(car => {
      grid.innerHTML += `
        <div class="card">
          <img src="${car.image}">
          <div class="card-content">
            <h2>${car.name}</h2>
            <p>${car.brand}</p>
            <span class="tag">${car.class}</span>
            <p>${car.speed}</p>
          </div>
        </div>
      `;
    });
}

function addCar() {
  const car = {
    name: document.getElementById("name").value,
    brand: document.getElementById("brand").value,
    class: document.getElementById("class").value,
    speed: document.getElementById("speed").value,
    image: document.getElementById("image").value
  };

  cars.push(car);
  localStorage.setItem("cars", JSON.stringify(cars));
  displayCars();
}

function filterClass(c) {
  currentFilter = c;
  displayCars();
}


document.getElementById("search").addEventListener("input", displayCars);

displayCars();
</script>

</body>
</html>
